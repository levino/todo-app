---
# todos.levinkeller.de -> oauth2-proxy (port 4180) -> frontend (port 3000)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todos
  namespace: todo-app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - todos.levinkeller.de
      secretName: todos-tls
  rules:
    - host: todos.levinkeller.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app
                port:
                  number: 4180
---
# mcp.todos.levinkeller.de -> MCP (port 3001) directly (bearer-token auth)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-todos
  namespace: todo-app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mcp.todos.levinkeller.de
      secretName: mcp-todos-tls
  rules:
    - host: mcp.todos.levinkeller.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app
                port:
                  number: 3001
