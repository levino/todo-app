apiVersion: v1
kind: Service
metadata:
  name: todo-app
  namespace: todo-app
  labels:
    app: todo-app
spec:
  selector:
    app: todo-app
  ports:
    # oauth2-proxy -> frontend (todos.levinkeller.de)
    - name: http
      port: 4180
      targetPort: 4180
    # MCP, exposed directly (mcp.todos.levinkeller.de) — bearer-token auth,
    # NOT routed through oauth2-proxy.
    - name: mcp
      port: 3001
      targetPort: 3001
