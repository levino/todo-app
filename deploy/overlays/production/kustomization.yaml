apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-app

resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Image tags are bumped by CI (deploy.yml) via `kustomize edit set image`.
images:
  - name: ghcr.io/levino/todo-app-frontend
    newTag: latest
  - name: ghcr.io/levino/todo-app-mcp
    newTag: latest
