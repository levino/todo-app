# Cross-origin callback stub standing in for claude.ai's
# /api/mcp/auth_callback. A DIFFERENT origin (host:port) than oauth2-proxy, so
# the OAuth authorization-code redirect to it is genuinely cross-origin — which
# is exactly what gets CORS-blocked when the consent form is submitted via the
# Astro ClientRouter's fetch() instead of a top-level navigation.
server {
    listen 9000;
    server_name callback;

    location / {
        default_type text/plain;
        return 200 "callback received\n";
    }
}
