name: Protect Migrations

on:
  pull_request:

jobs:
  check-migrations:
    name: Check migration files are not modified or deleted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for modified or deleted migrations
        run: |
          MIGRATION_DIR="packages/api/pocketbase/pb_migrations"

          CHANGED=$(git diff --diff-filter=MD --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$MIGRATION_DIR")

          if [ -n "$CHANGED" ]; then
            echo "::error::Migration files must not be modified or deleted!"
            echo ""
            echo "The following migration files were modified or deleted:"
            echo "$CHANGED" | while read -r file; do
              STATUS=$(git diff --diff-filter=MD --name-status origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | cut -f1)
              case "$STATUS" in
                M) echo "  MODIFIED: $file" ;;
                D) echo "  DELETED:  $file" ;;
              esac
            done
            echo ""
            echo "Migration files are immutable. You may only add new migration files."
            exit 1
          fi

          echo "All good — no migration files were modified or deleted."
