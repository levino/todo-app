# Example Secret shapes for levino-todo-app (namespace: todo-app).
#
# Seal real values with kubeseal against the cluster's Sealed Secrets public key
# from levino/server-config, e.g.:
#
#   kubeseal -f k8s/secrets.example.yaml \
#     --cert ../server-config/sealed-secrets-public-key.pem \
#     --format yaml \
#     > k8s/sealed-secrets.yaml
#
# Do NOT commit this file with real values — only the sealed output goes to git.
#
# Image pull: the cluster pulls the private GHCR image via the node's
# registries.yaml, so NO imagePullSecret is needed here.
---
apiVersion: v1
kind: Secret
metadata:
  name: levino-todo-app-secrets
  namespace: todo-app
type: Opaque
stringData:
  # Anthropic API key for the admin chat (agentic loop).
  ANTHROPIC_API_KEY: sk-ant-...
  # RS256 keypair for the app's own session JWT (auth_token cookie) and the MCP
  # Bearer-token flow. Persist these (do NOT regenerate per deploy) so existing
  # sessions and Claude's stored MCP token keep verifying across restarts.
  JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    ...
    -----END PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    ...
    -----END PUBLIC KEY-----
---
# NOTE: This secret is NOT created by these manifests — the operator seals it at
# deploy time. Shown here only to document the keys the oauth2-proxy sidecar
# expects. The ZITADEL client already exists with redirect
# https://todos.levinkeller.de/oauth2/callback.
apiVersion: v1
kind: Secret
metadata:
  name: todo-oauth2-proxy-secret
  namespace: todo-app
type: Opaque
stringData:
  # ZITADEL OIDC application client id / secret.
  client-id: "..."
  client-secret: "..."
  # oauth2-proxy cookie encryption secret (16, 24 or 32 random bytes, base64):
  #   openssl rand -base64 32 | tr -- '+/' '-_'
  cookie-secret: "..."
