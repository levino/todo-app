# Example Secret shape for levino-todo-app.
# To use in-cluster, run `kubeseal` against this file with the
# Sealed Secrets public key from levino/server-config:
#
#   kubeseal -f k8s/secrets.example.yaml \
#     --cert ../server-config/sealed-secrets-public-key.pem \
#     --format yaml \
#     > k8s/sealed-secrets.yaml
#
# Do NOT commit secrets.example.yaml with real values. Only the sealed
# output (k8s/sealed-secrets.yaml) goes into git.
apiVersion: v1
kind: Secret
metadata:
  name: levino-todo-app-secrets
  namespace: levino-todo-app
type: Opaque
stringData:
  ANTHROPIC_API_KEY: sk-ant-...
  JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    ...
    -----END PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    ...
    -----END PUBLIC KEY-----
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  SES_SMTP_USER: AKIA...
  SES_SMTP_PASS: ...
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: levino-todo-app
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"ghcr.io":{"auth":"<base64 of user:PAT>"}}}
