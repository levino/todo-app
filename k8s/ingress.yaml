apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: levino-todo-app
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: levino-todo-app
  namespace: levino-todo-app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: levino-todo-app-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - todos.levinkeller.de
      secretName: todos-levinkeller-de-tls
  rules:
    - host: todos.levinkeller.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: levino-todo-app
                port:
                  number: 80
