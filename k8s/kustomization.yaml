apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# secrets.example.yaml is intentionally excluded: it is documentation for the
# values an operator seals with kubeseal (the sealed output lives outside git /
# is applied separately), and todo-oauth2-proxy-secret is created by the
# operator, not by these manifests.
resources:
  - namespace.yaml
  - sealed-secrets.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# CI (build-and-push) bumps newTag to the freshly built :<sha> on each merge to
# main and commits it [skip ci]; Flux then rolls the deployment. The :latest in
# deployment.yaml is the base ref this overrides.
images:
  - name: ghcr.io/levino/levino-todo-app
    newTag: latest
