apiVersion: v1
kind: Service
metadata:
  name: levino-todo-app
  namespace: todo-app
spec:
  selector:
    app: levino-todo-app
  ports:
    # Front door is the oauth2-proxy sidecar. The app container (3000) is only
    # reachable from the proxy via 127.0.0.1 inside the pod.
    - name: http
      port: 80
      targetPort: proxy
  type: ClusterIP
